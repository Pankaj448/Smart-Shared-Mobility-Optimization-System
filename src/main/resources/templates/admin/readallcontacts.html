<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Read All Contacts</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f8fc;
            margin: 40px;
            color: #333;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        a {
            display: inline-block;
            text-decoration: none;
            background-color: #3498db;
            color: white;
            padding: 10px 18px;
            border-radius: 5px;
            margin-bottom: 20px;
            transition: background-color 0.3s ease;
        }

        a:hover {
            background-color: #2980b9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        thead {
            background-color: #3498db;
            color: white;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
        }

        tbody tr:nth-child(even) {
            background-color: #f2f6fc;
        }

        tbody tr:hover {
            background-color: #eaf3ff;
        }

        th {
            letter-spacing: 0.5px;
            font-size: 15px;
        }

        td {
            font-size: 14px;
            color: #555;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>All Contact Records</h1>

    <a href="dashboard">← Back to Admin Home</a>
	<h2 th:text="${message}"></h2>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>NAME</th>
            <th>EMAIL</th>
            <th>MESSAGE</th>
            <th>PHONE</th>
			<th>ACTION</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="contact : ${allcontacts}">
            <td th:text="${contact.id}"></td>
            <td th:text="${contact.name}"></td>
            <td th:text="${contact.email}"></td>
            <td th:text="${contact.message}"></td>
            <td th:text="${contact.phone}"></td>
			<td>
				<a th:href="@{/admin/deleteContact/{id}(id=${contact.id})   }  ">DELETE</a>
			</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
