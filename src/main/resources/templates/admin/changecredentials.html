<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change Credentials</title>
    <link rel="stylesheet" href="/css/modern.css">
</head>
<body>
    <main class="modern-form-section">
        <div class="container_12">
            <div class="grid_6 prefix_3">
                <form class="modern-form" action="changeCredentials" method="post">
                    <h3>Change Admin Credentials</h3>
                    <div class="modern-grid">
                        <div class="full">
                            <label>Old Username</label>
                            <input type="text" name="oldusername" placeholder="Enter old username" required>
                        </div>
                        <div class="full">
                            <label>Old Password</label>
                            <input type="password" name="oldpassword" placeholder="Enter old password" required>
                        </div>
                        <div class="full">
                            <label>New Username</label>
                            <input type="text" name="newusername" placeholder="Enter new username" required>
                        </div>
                        <div class="full">
                            <label>New Password</label>
                            <input type="password" name="newpassword" placeholder="Enter new password" required>
                        </div>
                    </div>
                    <button class="modern-btn" type="submit">Update Credentials</button>
                    <a class="secondary-action" href="dashboard" style="color:#10223d;border-color:#cbd5e1;margin-left:10px;">Dashboard</a>
                </form>
            </div>
            <div class="clear"></div>
        </div>
    </main>
</body>
</html>
