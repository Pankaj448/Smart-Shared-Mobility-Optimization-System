services:
  - type: web
    name: taxibooking
    env: java
    plan: free
    buildCommand: bash ./mvnw -DskipTests package
    startCommand: java -jar target/taxibooking-0.0.1-SNAPSHOT.jar
    autoDeploy: true
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: SHOW_SQL
        value: false
      - key: UPLOAD_DIR
        value: uploads/myserviceimg
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
